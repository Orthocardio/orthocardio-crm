<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ortho-Cardio | Omnichannel CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar: Contact List -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Ortho-Cardio</h2>
                <p>CRM Omnicanal</p>
            </div>
            <div class="contact-list" id="contact-list">
                <!-- Contacts will be injected here via JS -->
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area" id="chat-area" style="display: none;">
            <div class="chat-header">
                <div class="contact-info">
                    <h3 id="active-contact-name">Selecciona un chat</h3>
                    <p id="active-contact-phone"></p>
                </div>
                <div class="ai-toggle-container">
                    <span id="ai-status-label">🤖 IA Activa</span>
                    <label class="switch">
                        <input type="checkbox" id="ai-toggle" onchange="toggleAiMode()">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <div class="chat-history" id="chat-history">
                <!-- Messages will be injected here via JS -->
            </div>

            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="Escribe un mensaje al cliente..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" class="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </main>
        
        <!-- Empty State -->
        <div class="empty-state" id="empty-state">
            <div class="glass-card">
                <h2>Bienvenido al Centro de Control</h2>
                <p>Selecciona una conversación a la izquierda para comenzar a prospectar o asistir.</p>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
